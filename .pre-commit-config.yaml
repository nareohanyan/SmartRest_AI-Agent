repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff-check

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python3 -m mypy app
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: python3 -m pytest
        language: system
        pass_filenames: false
        types: [python]
