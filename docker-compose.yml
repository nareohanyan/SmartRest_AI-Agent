services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

  smartrest_db:
    image: postgres:16
    restart: unless-stopped
    profiles: ["db"]
    environment:
      POSTGRES_DB: smartrest
      POSTGRES_USER: smartrest
      POSTGRES_PASSWORD: smartrest
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
